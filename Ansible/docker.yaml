- name: Build and Deploy Petstore
  hosts: local
  become: yes
  tasks:
    - name: Log in to Docker Hub
      community.docker.docker_login:
        registry_url: https://index.docker.io/v1/
        username: "akhilkuchipudi26111997"
        password: "dckr_pat_37QfeSn9sOr0D8aH92B9rtFG08w"

    - name: Build and Push Docker image
      community.docker.docker_image:
        name: "akhilkuchipudi26111997/petstore"
        tag: latest
        build:
          path: /var/lib/jenkins/workspace/petstore
        push: yes
        source: build

    - name: Run Petstore container
      community.docker.docker_container:
        name: pet1
        image: "akhilkuchipudi26111997/petstore:latest"
        state: started
        restart_policy: always
        published_ports:
          - "8090:8080"
